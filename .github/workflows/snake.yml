name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Snake Game
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Nix0010
          outputs: |
            dist/github-snake.svg?color_snake=#00F0FF
            dist/github-snake-dark.svg?color_snake=#00F0FF&color_dots=#0d1117,#075985,#0369a1,#0284c7,#00F0FF

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
