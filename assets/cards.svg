<svg xmlns="http://www.w3.org/2000/svg" width="850" height="240" viewBox="0 0 850 240">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&amp;family=Inter:wght@400;700;900&amp;display=swap');
      .bg { fill: #0B0F19; }
      .card-bg { fill: #0B0F19; stroke: #1E293B; stroke-width: 1; }
      .card-border { stroke: #00F0FF; stroke-width: 1; fill: none; opacity: 0.5; }
      .title { font-family: 'Inter', sans-serif; font-weight: 900; font-size: 20px; fill: #00F0FF; }
      .subtitle { font-family: 'Fira Code', monospace; font-size: 10px; fill: #64748B; letter-spacing: 2px; }
      .text-main { font-family: 'Inter', sans-serif; font-size: 13px; fill: #CBD5E1; line-height: 1.5; }
      .text-hl { fill: #00F0FF; font-weight: 700; }
      .list-item { font-family: 'Fira Code', monospace; font-size: 12px; fill: #94A3B8; }
      .dot { fill: #00F0FF; }
      .glow { filter: drop-shadow(0 0 4px rgba(0, 240, 255, 0.4)); }
    </style>
  </defs>

  <!-- Background is transparent here or matches repo -->
  <!-- Card 1: Snapshot -->
  <g transform="translate(10, 10)">
    <rect width="260" height="220" rx="4" class="card-bg"/>
    <path d="M 0 10 L 0 0 L 10 0 M 250 0 L 260 0 L 260 10 M 260 210 L 260 220 L 250 220 M 10 220 L 0 220 L 0 210" class="card-border glow"/>
    <text x="20" y="30" class="subtitle">01 / SNAPSHOT</text>
    <circle cx="240" cy="26" r="3" class="dot glow"/>
    <text x="20" y="60" class="title glow">SNAPSHOT</text>
    <text x="20" y="75" class="subtitle" style="font-size: 8px;">WHO.AM.I()</text>
    
    <foreignObject x="20" y="95" width="220" height="100">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family: 'Inter', sans-serif; font-size: 13px; color: #CBD5E1; line-height: 1.6;">
        <span style="color: #00F0FF; font-weight: bold;">Full-Stack Dev</span> &amp; <span style="color: #00F0FF; font-weight: bold;">Database Arch</span> creando soluciones escalables. Experiencia en 
        <span style="color: #00F0FF;">PostgreSQL</span>, <span style="color: #00F0FF;">React</span>, <span style="color: #00F0FF;">Node.js</span> y Cloud.
      </div>
    </foreignObject>
    
    <text x="20" y="200" class="subtitle" style="fill:#3B82F6;">mindset · build · ship · iterate</text>
  </g>

  <!-- Card 2: Currently -->
  <g transform="translate(295, 10)">
    <rect width="260" height="220" rx="4" class="card-bg"/>
    <path d="M 0 10 L 0 0 L 10 0 M 250 0 L 260 0 L 260 10 M 260 210 L 260 220 L 250 220 M 10 220 L 0 220 L 0 210" class="card-border glow"/>
    <text x="20" y="30" class="subtitle">02 / CURRENTLY</text>
    <circle cx="240" cy="26" r="3" class="dot glow"/>
    <text x="20" y="60" class="title glow">CURRENTLY</text>
    <text x="20" y="75" class="subtitle" style="font-size: 8px;">ACTIVE.PROCESSES()</text>
    
    <text x="20" y="110" class="list-item"><tspan class="dot">▶</tspan> SHIP:  ARMPRO / ARMRANK</text>
    <text x="20" y="135" class="list-item"><tspan class="dot">▶</tspan> CODE:  Node.js &amp; TypeScript</text>
    <text x="20" y="160" class="list-item"><tspan class="dot">▶</tspan> LEARN: AI Agents &amp; Groq</text>
    <text x="20" y="185" class="list-item"><tspan class="dot">▶</tspan> BUILD: WhatsApp AI Bots</text>
    
    <text x="20" y="200" class="subtitle" style="fill:#3B82F6;">status · available for hire</text>
  </g>

  <!-- Card 3: Find Me -->
  <g transform="translate(580, 10)">
    <rect width="260" height="220" rx="4" class="card-bg"/>
    <path d="M 0 10 L 0 0 L 10 0 M 250 0 L 260 0 L 260 10 M 260 210 L 260 220 L 250 220 M 10 220 L 0 220 L 0 210" class="card-border glow"/>
    <text x="20" y="30" class="subtitle">03 / FIND ME</text>
    <circle cx="240" cy="26" r="3" class="dot glow"/>
    <text x="20" y="60" class="title glow">FIND ME</text>
    <text x="20" y="75" class="subtitle" style="font-size: 8px;">CONTACT.CHANNELS()</text>
    
    <text x="20" y="110" class="list-item"><tspan class="dot">▶</tspan> WEB:  github.com/Nix0010</text>
    <text x="20" y="135" class="list-item"><tspan class="dot">▶</tspan> MAIL: tuemail@dominio.com</text>
    <text x="20" y="160" class="list-item"><tspan class="dot">▶</tspan> IN:   /in/TU_LINKEDIN</text>
    <text x="20" y="185" class="list-item"><tspan class="dot">▶</tspan> GEO:  Colombia — UTC-5</text>
    
    <text x="20" y="200" class="subtitle" style="fill:#3B82F6;">uptime · 24 / 7</text>
  </g>
</svg>
