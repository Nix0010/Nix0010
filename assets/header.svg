<svg xmlns="http://www.w3.org/2000/svg" width="850" height="280" viewBox="0 0 850 280">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&amp;family=Inter:wght@400;700;900&amp;display=swap');
      .bg { fill: #0B0F19; }
      .grid { stroke: #152238; stroke-width: 1; }
      .text-title { font-family: 'Inter', sans-serif; font-weight: 900; font-size: 64px; fill: #00F0FF; text-anchor: middle; letter-spacing: -2px; }
      .text-subtitle { font-family: 'Fira Code', monospace; font-size: 18px; fill: #94A3B8; text-anchor: middle; }
      .text-neon { fill: #00F0FF; }
      .text-small { font-family: 'Fira Code', monospace; font-size: 10px; fill: #3B82F6; letter-spacing: 2px; }
      .accent { stroke: #00F0FF; stroke-width: 2; fill: none; }
      .glow { filter: drop-shadow(0 0 8px rgba(0, 240, 255, 0.6)); }
      .subtle { fill: #1E293B; }
    </style>
    <pattern id="gridPattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" class="grid"/>
    </pattern>
  </defs>
  
  <rect width="100%" height="100%" class="bg" rx="10"/>
  <rect width="100%" height="100%" fill="url(#gridPattern)" rx="10"/>
  
  <path d="M 30 30 L 150 30" class="accent"/>
  <path d="M 30 30 L 30 50" class="accent"/>
  <text x="40" y="24" class="text-small glow">— PORTFOLIO // V2026 // COLOMBIA</text>
  
  <path d="M 820 250 L 700 250" class="accent"/>
  <path d="M 820 250 L 820 230" class="accent"/>
  
  <text x="425" y="150" class="text-title glow">Leyder Alvarez</text>
  <text x="425" y="190" class="text-subtitle">&lt; Full Stack Architect &amp; AI Developer /&gt;</text>
  
  <rect x="365" y="220" width="120" height="24" rx="12" fill="#00F0FF" fill-opacity="0.1" stroke="#00F0FF" stroke-width="1"/>
  <text x="425" y="236" class="text-small" text-anchor="middle" style="fill: #00F0FF;">AVAILABLE FOR HIRE</text>

  <circle cx="730" cy="140" r="60" stroke="#1E293B" stroke-width="1" fill="none" stroke-dasharray="4 4"/>
  <circle cx="730" cy="140" r="40" class="accent glow" stroke-dasharray="10 5"/>
  <circle cx="730" cy="140" r="2" fill="#00F0FF" class="glow"/>
  <text x="730" y="143" font-family="'Fira Code', monospace" font-size="8" fill="#00F0FF" text-anchor="middle" letter-spacing="1">SYSTEM</text>
  
  <path d="M 80 140 L 100 140 M 90 130 L 90 150" stroke="#3B82F6" stroke-width="1"/>
</svg>
