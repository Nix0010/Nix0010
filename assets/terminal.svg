<svg xmlns="http://www.w3.org/2000/svg" width="850" height="320" viewBox="0 0 850 320">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&amp;display=swap');
      .window { fill: #0B0F19; stroke: #1E293B; stroke-width: 1; }
      .bar { fill: #151E2E; }
      .dot-r { fill: #EF4444; }
      .dot-y { fill: #EAB308; }
      .dot-g { fill: #22C55E; }
      .text-code { font-family: 'Fira Code', monospace; font-size: 14px; fill: #CBD5E1; }
      .text-prompt { fill: #00F0FF; font-weight: 500; }
      .text-string { fill: #34D399; }
      .text-key { fill: #93C5FD; }
      .text-bool { fill: #F59E0B; }
      .text-comment { fill: #64748B; font-style: italic; }
      .title { font-family: 'Fira Code', monospace; font-size: 12px; fill: #64748B; text-anchor: middle; }
    </style>
  </defs>

  <rect x="10" y="10" width="830" height="300" rx="8" class="window"/>
  <path d="M 10 18 Q 10 10 18 10 L 832 10 Q 840 10 840 18 L 840 35 L 10 35 Z" class="bar"/>
  
  <circle cx="25" cy="22" r="5" class="dot-r"/>
  <circle cx="45" cy="22" r="5" class="dot-y"/>
  <circle cx="65" cy="22" r="5" class="dot-g"/>
  <text x="425" y="25" class="title">nix0010 — zsh — ~/about-me</text>

  <g transform="translate(30, 65)">
    <text y="0" class="text-code"><tspan class="text-prompt">nix0010@system</tspan> ~/about <tspan class="text-comment">--verbose</tspan></text>
    <text y="25" class="text-code">{</text>
    <text y="50" class="text-code">  <tspan class="text-key">"name"</tspan>: <tspan class="text-string">"Leyder Alvarez"</tspan>,</text>
    <text y="75" class="text-code">  <tspan class="text-key">"role"</tspan>: <tspan class="text-string">"Full-Stack Architect &amp; AI Integration"</tspan>,</text>
    <text y="100" class="text-code">  <tspan class="text-key">"location"</tspan>: <tspan class="text-string">"Colombia"</tspan>,</text>
    <text y="125" class="text-code">  <tspan class="text-key">"skills"</tspan>: [<tspan class="text-string">"TypeScript"</tspan>, <tspan class="text-string">"React"</tspan>, <tspan class="text-string">"Node.js"</tspan>, <tspan class="text-string">"PostgreSQL"</tspan>, <tspan class="text-string">"Groq AI"</tspan>],</text>
    <text y="150" class="text-code">  <tspan class="text-key">"ai_integrated"</tspan>: <tspan class="text-bool">true</tspan></text>
    <text y="175" class="text-code">}</text>
    
    <text y="210" class="text-code"><tspan class="text-prompt">nix0010@system</tspan> ~/about &gt; <tspan class="text-prompt">./mission.sh</tspan></text>
    <text y="235" class="text-code"><tspan class="text-string">"Transformo ideas complejas en código limpio y sistemas escalables."</tspan></text>
  </g>
</svg>
